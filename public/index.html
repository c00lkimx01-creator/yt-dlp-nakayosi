<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YT googlevideo Resolver</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: radial-gradient(1200px 600px at 20% 0%, #1f2937, #0b0f17 60%);
        color: #e5e7eb;
      }
      .card {
        width: min(900px, 94vw); padding: 28px;
        background: rgba(17,24,39,.7); border: 1px solid #1f2937;
        border-radius: 16px; backdrop-filter: blur(8px);
        box-shadow: 0 20px 60px rgba(0,0,0,.4);
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      p.sub { margin: 0 0 20px; color: #9ca3af; font-size: 14px; }
      .row { display: flex; gap: 8px; }
      input, button {
        font: inherit; padding: 12px 14px; border-radius: 10px; border: 1px solid #374151;
        background: #0b1220; color: #e5e7eb;
      }
      input { flex: 1; }
      button { background: #2563eb; border-color: #2563eb; cursor: pointer; }
      button:disabled { opacity: .6; cursor: progress; }
      .meta { margin-top: 16px; font-size: 13px; color: #9ca3af; }
      .group { margin-top: 14px; }
      .group h3 { margin: 0 0 6px; font-size: 14px; color: #93c5fd; }
      .url-box {
        margin-top: 6px; padding: 10px 12px; border-radius: 8px;
        background: #0b1220; border: 1px solid #1f2937;
        word-break: break-all; font-family: ui-monospace, monospace; font-size: 12px;
        display: flex; gap: 8px; align-items: flex-start;
      }
      .url-box a { color: #60a5fa; flex: 1; }
      .url-box .tag {
        flex: 0 0 auto; padding: 2px 6px; border-radius: 4px;
        background: #1f2937; color: #9ca3af; font-size: 11px;
      }
      .copy { cursor: pointer; color: #9ca3af; background: none; border: none; padding: 0 4px; }
      .err { color: #f87171; }
      video { width: 100%; margin-top: 16px; border-radius: 10px; background: #000; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>YouTube googlevideo Resolver</h1>
      <p class="sub">Video ID を入力すると manifest 内の googlevideo 直リンクを一覧表示します。</p>
      <form id="f" class="row">
        <input id="id" placeholder="例: dQw4w9WgXcQ" autocomplete="off" required />
        <button id="go" type="submit">取得</button>
      </form>
      <div id="result"></div>
    </div>
    <script>
      const f = document.getElementById("f");
      const idEl = document.getElementById("id");
      const go = document.getElementById("go");
      const result = document.getElementById("result");

      function row(u) {
        const tag = u.type ? `<span class="tag">${u.type}${u.itag ? " · itag " + u.itag : ""}${u.quality ? " · " + u.quality : ""}</span>` : "";
        return `<div class="url-box">${tag}<a href="${u.url}" target="_blank" rel="noreferrer">${u.url}</a><button class="copy" data-u="${encodeURIComponent(u.url)}" title="copy">📋</button></div>`;
      }

      f.addEventListener("submit", async (e) => {
        e.preventDefault();
        const id = idEl.value.trim();
        result.innerHTML = "";
        go.disabled = true; go.textContent = "取得中…";
        try {
          const r = await fetch(`/api/video/${encodeURIComponent(id)}`);
          const text = await r.text();
          let j;
          try { j = JSON.parse(text); }
          catch { throw new Error(`Non-JSON (${r.status}): ${text.slice(0,160)}`); }
          if (j.error && (!j.urls || !j.urls.length)) throw new Error(j.error);

          const urls = j.urls || [];
          const manifests = (j.manifests || []);
          const direct = urls.filter(u => /googlevideo\.com/.test(u.url));
          const others = urls.filter(u => !/googlevideo\.com/.test(u.url));

          let html = `<div class="meta">source: ${j.source || "-"} · googlevideo: ${direct.length} · その他: ${others.length} · manifest: ${manifests.length}</div>`;

          if (manifests.length) {
            html += `<div class="group"><h3>Manifest URL</h3>${manifests.map(m => row(m)).join("")}</div>`;
          }
          if (direct.length) {
            html += `<div class="group"><h3>googlevideo 直リンク</h3>${direct.map(u => row(u)).join("")}</div>`;
          }
          if (others.length) {
            html += `<div class="group"><h3>その他</h3>${others.map(u => row(u)).join("")}</div>`;
          }

          const playable = manifests[0]?.url || direct[0]?.url || urls[0]?.url;
          if (playable) html += `<video src="${playable}" controls></video>`;

          result.innerHTML = html;

          result.querySelectorAll(".copy").forEach((b) => {
            b.addEventListener("click", () => {
              navigator.clipboard.writeText(decodeURIComponent(b.dataset.u));
              b.textContent = "✓";
              setTimeout(() => (b.textContent = "📋"), 1000);
            });
          });
        } catch (err) {
          result.innerHTML = `<div class="url-box err">${err.message}</div>`;
        } finally {
          go.disabled = false; go.textContent = "取得";
        }
      });
    </script>
  </body>
</html>
