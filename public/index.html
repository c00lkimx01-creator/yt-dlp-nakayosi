<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YT googlevideo Resolver</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: radial-gradient(1200px 600px at 20% 0%, #1f2937, #0b0f17 60%);
        color: #e5e7eb;
      }
      .card {
        width: min(900px, 94vw); padding: 28px;
        background: rgba(17,24,39,.7); border: 1px solid #1f2937;
        border-radius: 16px; backdrop-filter: blur(8px);
        box-shadow: 0 20px 60px rgba(0,0,0,.4);
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      p.sub { margin: 0 0 20px; color: #9ca3af; font-size: 14px; }
      .row { display: flex; gap: 8px; }
      input, button {
        font: inherit; padding: 12px 14px; border-radius: 10px; border: 1px solid #374151;
        background: #0b1220; color: #e5e7eb;
      }
      input { flex: 1; }
      button { background: #2563eb; border-color: #2563eb; cursor: pointer; }
      button:disabled { opacity: .6; cursor: progress; }
      .meta { margin-top: 16px; font-size: 13px; color: #9ca3af; }
      .group { margin-top: 14px; }
      .group h3 { margin: 0 0 6px; font-size: 14px; color: #93c5fd; }
      .url-box {
        margin-top: 6px; padding: 10px 12px; border-radius: 8px;
        background: #0b1220; border: 1px solid #1f2937;
        word-break: break-all; font-family: ui-monospace, monospace; font-size: 12px;
        display: flex; gap: 8px; align-items: flex-start;
      }
      .url-box a { color: #60a5fa; flex: 1; }
      .url-box .tag {
        flex: 0 0 auto; padding: 2px 6px; border-radius: 4px;
        background: #1f2937; color: #9ca3af; font-size: 11px;
      }
      .copy { cursor: pointer; color: #9ca3af; background: none; border: none; padding: 0 4px; }
      .play { cursor: pointer; color: #93c5fd; background: none; border: none; padding: 0 4px; }
      .err { color: #f87171; }
      .player { position: relative; margin-top: 16px; }
      video { width: 100%; border-radius: 10px; background: #000; }
      .player audio { display: none; }
      .hint { margin-top: 6px; font-size: 12px; color: #9ca3af; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>YouTube googlevideo Resolver</h1>
      <p class="sub">Video ID を入力すると映像/音声/混合 / m3u8 (HLS) を取得します。</p>
      <form id="f" class="row">
        <input id="id" placeholder="例: dQw4w9WgXcQ" autocomplete="off" required />
        <button id="go" type="submit">取得</button>
      </form>
      <div id="result"></div>
    </div>
    <script>
      const f = document.getElementById("f");
      const idEl = document.getElementById("id");
      const go = document.getElementById("go");
      const result = document.getElementById("result");

      function row(u, opts = {}) {
        const bits = [];
        if (u.kind || u.type) bits.push(u.kind || u.type);
        if (u.itag) bits.push("itag " + u.itag);
        if (u.quality) bits.push(u.quality);
        if (u.audioQuality) bits.push(u.audioQuality);
        if (u.bitrate) bits.push(Math.round(u.bitrate/1000) + "kbps");
        const tag = bits.length ? `<span class="tag">${bits.join(" · ")}</span>` : "";
        const playBtn = opts.hls ? `<button class="play" data-hls="${encodeURIComponent(u.url)}" title="HLS再生">▶</button>` : "";
        return `<div class="url-box">${tag}<a href="${u.url}" target="_blank" rel="noreferrer">${u.url}</a>${playBtn}<button class="copy" data-u="${encodeURIComponent(u.url)}" title="copy">📋</button></div>`;
      }

      function mountPlayer(videoUrl, audioUrl) {
        const wrap = document.createElement("div");
        wrap.className = "player";
        const v = document.createElement("video");
        v.src = videoUrl;
        v.controls = true;
        v.playsInline = true;
        wrap.appendChild(v);

        if (audioUrl) {
          const a = document.createElement("audio");
          a.src = audioUrl;
          a.preload = "auto";
          wrap.appendChild(a);
          v.muted = true;
          v.addEventListener("play",  () => a.play().catch(()=>{}));
          v.addEventListener("pause", () => a.pause());
          v.addEventListener("seeking",  () => { a.currentTime = v.currentTime; });
          v.addEventListener("ratechange", () => { a.playbackRate = v.playbackRate; });
          v.addEventListener("volumechange", () => { a.volume = v.volume; });
          v.addEventListener("timeupdate", () => {
            const drift = Math.abs(a.currentTime - v.currentTime);
            if (drift > 0.3) a.currentTime = v.currentTime;
          });
          const hint = document.createElement("div");
          hint.className = "hint";
          hint.textContent = "※ 映像と音声は別ストリームをブラウザで同期再生しています。";
          wrap.appendChild(hint);
        }
        return wrap;
      }

      function mountHlsPlayer(m3u8Url) {
        const wrap = document.createElement("div");
        wrap.className = "player";
        const v = document.createElement("video");
        v.controls = true;
        v.playsInline = true;
        wrap.appendChild(v);

        if (v.canPlayType("application/vnd.apple.mpegurl")) {
          v.src = m3u8Url;
        } else if (window.Hls && window.Hls.isSupported()) {
          const hls = new window.Hls();
          hls.loadSource(m3u8Url);
          hls.attachMedia(v);
        } else {
          const hint = document.createElement("div");
          hint.className = "hint err";
          hint.textContent = "このブラウザは HLS 再生に対応していません。";
          wrap.appendChild(hint);
        }
        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = "※ m3u8 (HLS) を再生中。";
        wrap.appendChild(hint);
        return wrap;
      }

      f.addEventListener("submit", async (e) => {
        e.preventDefault();
        const id = idEl.value.trim();
        result.innerHTML = "";
        go.disabled = true; go.textContent = "取得中…";
        try {
          const r = await fetch(`/api/video/${encodeURIComponent(id)}`);
          const text = await r.text();
          let j;
          try { j = JSON.parse(text); }
          catch { throw new Error(`Non-JSON (${r.status}): ${text.slice(0,160)}`); }
          if (j.error && (!j.urls || !j.urls.length) && (!j.urls_m3u8 || !j.urls_m3u8.length)) throw new Error(j.error);

          const urls = j.urls || [];
          const manifests = j.manifests || [];
          const urls_m3u8 = j.urls_m3u8 || [];

          const muxed = urls.filter(u => (u.kind || u.type) === "muxed");
          const video = urls.filter(u => (u.kind || u.type) === "video");
          const audio = urls.filter(u => (u.kind || u.type) === "audio");
          const others = urls.filter(u => !["muxed","video","audio"].includes(u.kind || u.type));

          let html = `<div class="meta">source: ${j.source || "-"} · muxed: ${muxed.length} · video: ${video.length} · audio: ${audio.length} · m3u8: ${urls_m3u8.length} · manifest: ${manifests.length}</div>`;

          if (urls_m3u8.length) {
            html += `<div class="group"><h3>urls-m3u8 (HLS)</h3>${urls_m3u8.map(u => row(u, { hls: true })).join("")}</div>`;
          }
          if (manifests.length) {
            html += `<div class="group"><h3>Manifest</h3>${manifests.map(m => row(m)).join("")}</div>`;
          }
          if (muxed.length) {
            html += `<div class="group"><h3>映像+音声 (muxed)</h3>${muxed.map(u => row(u)).join("")}</div>`;
          }
          if (video.length) {
            html += `<div class="group"><h3>映像のみ (video)</h3>${video.map(u => row(u)).join("")}</div>`;
          }
          if (audio.length) {
            html += `<div class="group"><h3>音声のみ (audio)</h3>${audio.map(u => row(u)).join("")}</div>`;
          }
          if (others.length) {
            html += `<div class="group"><h3>その他</h3>${others.map(u => row(u)).join("")}</div>`;
          }

          result.innerHTML = html;

          // プレーヤー: muxed > video+audio > m3u8(HLS)
          const bestAudio = audio[0]?.url;
          const bestVideo = muxed[0]?.url || video[0]?.url;
          if (bestVideo) {
            result.appendChild(mountPlayer(bestVideo, muxed[0] ? null : bestAudio));
          } else if (urls_m3u8[0]) {
            result.appendChild(mountHlsPlayer(urls_m3u8[0].url));
          }

          result.querySelectorAll(".copy").forEach((b) => {
            b.addEventListener("click", () => {
              navigator.clipboard.writeText(decodeURIComponent(b.dataset.u));
              b.textContent = "✓";
              setTimeout(() => (b.textContent = "📋"), 1000);
            });
          });
          result.querySelectorAll(".play").forEach((b) => {
            b.addEventListener("click", () => {
              const url = decodeURIComponent(b.dataset.hls);
              const old = result.querySelector(".player");
              if (old) old.remove();
              result.appendChild(mountHlsPlayer(url));
            });
          });
        } catch (err) {
          result.innerHTML = `<div class="url-box err">${err.message}</div>`;
        } finally {
          go.disabled = false; go.textContent = "取得";
        }
      });
    </script>
  </body>
</html>
